name: JustPay Linux Build

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Clean Qt cache
        run: |
          rm -rf ~/.cache/aqtinstall || true
          rm -rf ~/Qt || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          host: linux
          target: desktop
          arch: "gcc_64"
          aqtversion: "==3.1.7"

      - name: Configure (Release)
        run: |
          cmake -S . -B build/release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build/release --parallel 4

      - name: Install linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Package AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/release/JustPay AppDir/usr/bin/

          echo "[Desktop Entry]" > AppDir/usr/share/applications/JustPay.desktop
          echo "Name=JustPay" >> AppDir/usr/share/applications/JustPay.desktop
          echo "Exec=JustPay" >> AppDir/usr/share/applications/JustPay.desktop
          echo "Type=Application" >> AppDir/usr/share/applications/JustPay.desktop
          echo "Categories=Finance;" >> AppDir/usr/share/applications/JustPay.desktop
          echo "Icon=JustPay" >> AppDir/usr/share/applications/JustPay.desktop

          wget -q -O AppDir/usr/share/icons/hicolor/256x256/apps/JustPay.png \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy/master/resources/linuxdeploy.png

          export QMAKE=$Qt6_DIR/bin/qmake
          export OUTPUT=JustPay-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: JustPay-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
